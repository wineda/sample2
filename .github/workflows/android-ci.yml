name: Android CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  build:
    name: Build Android app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Show Gradle and Java version
        run: |
          java -version
          ./gradlew --version

      - name: Build debug APK
        id: build_debug_apk
        shell: bash
        run: |
          set -o pipefail
          ./gradlew :app:assembleDebug --stacktrace 2>&1 | tee build-debug.log

      - name: Comment build failure log on PR
        if: ${{ always() && github.event_name == 'pull_request' && steps.build_debug_apk.outcome == 'failure' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const marker = '<!-- android-ci-failure-log -->';
            const logPath = 'build-debug.log';

            let log = fs.existsSync(logPath)
              ? fs.readFileSync(logPath, 'utf8')
              : 'build-debug.log was not found.';

            const maxChars = 60000;
            if (log.length > maxChars) {
              log = log.slice(log.length - maxChars);
              log = `... log truncated. Showing last ${maxChars} chars ...\n\n${log}`;
            }

            // Markdownのコードフェンス崩れ対策
            log = log.replace(/```/g, '` ` `');

            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;

            const body = `${marker}
            ## ❌ Android CI build failed

            ビルドログをCodexへ渡しやすい形で貼っています。

            **Workflow run:** ${runUrl}

            ### Codexに投げる用

            以下のGitHub Actions失敗ログを読んで、Androidビルドが通るように修正してください。

            \`\`\`text
            ${log}
            \`\`\`
            `;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const previous = comments.data.find(comment =>
              comment.user?.type === 'Bot' &&
              comment.body?.includes(marker)
            );

            if (previous) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Run unit tests (disabled)
        if: ${{ false }}
        run: ./gradlew :app:testDebugUnitTest --stacktrace
